<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxeFit UAE Operations Platform v2.0</title>
    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #04091a; color: #e2eeff; }
        .serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #060e22; }
        ::-webkit-scrollbar-thumb { background: #1a3360; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a4f90; }
        
        .glass { background: rgba(12, 24, 48, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(26, 51, 96, 0.5); }
        .sidebar-item-active { background: rgba(14, 165, 233, 0.12); color: #0ea5e9; border-left: 3px solid #0ea5e9; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /* ─── MSAL Configuration ─── */
        const msalConfig = {
            auth: {
                clientId: "cd1b7f5f-5ff9-4066-ab4f-06f270a94fcb",
                authority: "https://login.microsoftonline.com/core-velocity.com",
                redirectUri: window.location.origin + window.location.pathname,
                navigateToLoginRequestUrl: true
            },
            cache: {
                cacheLocation: "sessionStorage",
                storeAuthStateInCookie: false,
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        /* ─── RBAC Configuration ─── */
        const ADMIN_EMAILS = ["ahmed@core-velocity.com"];
        const OPS_EMAILS = [
            "charlie@core-velocity.com", 
            "prem@core-velocity.com", 
            "gladys@core-velocity.com", 
            "sami@core-velocity.com", 
            "kamal@core-velocity.com"
        ];

        /* ─── Colors ─── */
        const T = {
            bg0: '#04091a', bg1: '#08112b', bg2: '#0d1c3d', bg3: '#122350',
            border: '#1a3360', borderHover: '#2a4f90',
            primary: '#0ea5e9', primaryDark: '#0284c7', gold: '#f59e0b',
            success: '#10b981', warn: '#f59e0b', danger: '#ef4444', purple: '#8b5cf6',
            textPrimary: '#e2eeff', textSec: '#7da0cc', textMuted: '#3d6091'
        };

        /* ─── Seed Data ─── */
        const SEED = {
            deliveries: [
                { id: 'DN-2401', orderDate: '2024-05-10', customer: 'Fitness First UAE', status: 'Delivered', units: 4, special: 'Installation required', estDelivery: '2024-05-20', actDelivery: '2024-05-19' },
                { id: 'DN-2402', orderDate: '2024-05-15', customer: 'Dubai Sports City', status: 'In Transit', units: 2, special: 'White-glove', estDelivery: '2024-05-28', actDelivery: '' },
                { id: 'DN-2403', orderDate: '2024-06-01', customer: 'Abu Dhabi Health Authority', status: 'Pending', units: 6, special: 'Custom branding', estDelivery: '2024-06-15', actDelivery: '' }
            ],
            spares: [
                { id: 'SP-001', partName: 'Resistance Band Set', partNo: 'OXF-RB-01', category: 'Accessories', stock: 24, minStock: 10, location: 'Dubai WH', updated: '2024-06-01' },
                { id: 'SP-002', partName: 'Force Sensor Module', partNo: 'OXF-FS-02', category: 'Electronics', stock: 6, minStock: 8, location: 'Dubai WH', updated: '2024-05-18' }
            ],
            shipping: [
                { id: 'SH-001', date: '2024-05-12', carrier: 'Aramex UAE', origin: 'Chicago, US', dest: 'Dubai, UAE', weight: '340 kg', cost: 4200, status: 'Cleared', notes: 'Main shipment Q2' }
            ],
            tickets: [
                { id: 'TK-001', subject: 'Display flickering - Fitness First JBR', source: 'Outlook', priority: 'High', status: 'Open', assignee: 'Prem', created: '2024-06-04', due: '2024-06-06' }
            ]
        };

        /* ─── Components ─── */

        const Icon = ({ name, size = 18, color = 'currentColor', className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v7H3V3zm11 0h7v7h-7V3zm-11 11h7v7H3v-7zm11 0h7v7h-7v-7z",
                delivery: "M1 3h15v13H1V3zm15 5h4l3 3v5h-7V8z",
                spare: "M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z",
                shipping: "M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3M9 11h14v10H9V11zM12 17v-6l3 2 3-2v6",
                ticket: "M2 9a3 3 0 010-6h20a3 3 0 010 6M2 15a3 3 0 000 6h20a3 3 0 000-6M4 12h16",
                logout: "M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9",
                plus: "M12 5v14M5 12h14",
                edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",
                trash: "M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6",
                sync: "M21.5 2v6h-6M2.5 22v-6h6M22 11.5A10 10 0 003.2 7.2M2 12.5a10 10 0 0018.8 4.2",
                check: "M20 6L9 17l-5-5",
                user: "M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"
            };
            return (
                <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const Badge = ({ label, status }) => {
            const styles = {
                'Delivered': 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                'In Transit': 'bg-sky-500/10 text-sky-400 border-sky-500/20',
                'Pending': 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                'Processing': 'bg-purple-500/10 text-purple-400 border-purple-500/20',
                'Cleared': 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                'Open': 'bg-rose-500/10 text-rose-400 border-rose-500/20',
                'High': 'bg-rose-500/10 text-rose-400 border-rose-500/20',
                'Medium': 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                'Low': 'bg-slate-500/10 text-slate-400 border-slate-500/20'
            };
            return (
                <span className={`px-2 py-0.5 rounded text-[10px] font-bold tracking-wider uppercase border ${styles[status] || 'bg-slate-500/10 text-slate-400 border-slate-500/20'}`}>
                    {label || status}
                </span>
            );
        };

        /* ─── App Root ─── */
        function App() {
            const [account, setAccount] = useState(null);
            const [role, setRole] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeModule, setActiveModule] = useState('dashboard');
            const [data, setData] = useState(SEED);
            const [syncStatus, setSyncStatus] = useState('idle'); // idle, syncing, success, error

            useEffect(() => {
                msalInstance.handleRedirectPromise().then(res => {
                    const currentAccount = res?.account || msalInstance.getAllAccounts()[0];
                    if (currentAccount) {
                        setAccount(currentAccount);
                        const email = currentAccount.username.toLowerCase();
                        if (ADMIN_EMAILS.includes(email)) setRole('admin');
                        else if (OPS_EMAILS.includes(email) || email.includes('ahmed')) setRole('admin'); // Fallback for Ahmed
                        else setRole('operational');
                        
                        loadFromOneDrive(currentAccount);
                    }
                    setLoading(false);
                }).catch(err => {
                    console.error(err);
                    setLoading(false);
                });
            }, []);

            const login = () => {
                msalInstance.loginRedirect({ scopes: ["User.Read", "Files.ReadWrite.All", "Mail.Read"] });
            };

            const logout = () => {
                msalInstance.logoutRedirect();
            };

            const saveToOneDrive = async (newData) => {
                if (!account) return;
                setSyncStatus('syncing');
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({
                        scopes: ["Files.ReadWrite.All"],
                        account: account
                    });
                    const blob = new Blob([JSON.stringify(newData)], { type: 'application/json' });
                    await fetch("https://graph.microsoftonline.com/v1.0/me/drive/special/approot:/uae_ops_data_v2.json:/content", {
                        method: "PUT",
                        headers: { "Authorization": `Bearer ${tokenRes.accessToken}` },
                        body: blob
                    });
                    setSyncStatus('success');
                    setTimeout(() => setSyncStatus('idle'), 3000);
                } catch (err) {
                    console.error("OneDrive Sync Error", err);
                    setSyncStatus('error');
                }
            };

            const loadFromOneDrive = async (acc) => {
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({
                        scopes: ["Files.ReadWrite.All"],
                        account: acc
                    });
                    const res = await fetch("https://graph.microsoftonline.com/v1.0/me/drive/special/approot:/uae_ops_data_v2.json:/content", {
                        headers: { "Authorization": `Bearer ${tokenRes.accessToken}` }
                    });
                    if (res.ok) {
                        const cloudData = await res.json();
                        setData(cloudData);
                    }
                } catch (err) {
                    console.warn("No cloud data found, using local seed.");
                }
            };

            const updateData = (newData) => {
                setData(newData);
                saveToOneDrive(newData);
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-sky-500"></div>
                </div>
            );

            if (!account) return (
                <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(#1e3a8a 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
                    <div className="max-w-md w-full glass p-10 rounded-3xl shadow-2xl relative z-10 border border-sky-500/20 text-center">
                        <div className="w-20 h-20 bg-gradient-to-br from-sky-500 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-sky-500/30 mb-8">
                            <span className="text-3xl font-black text-white italic">OX</span>
                        </div>
                        <h1 className="serif text-3xl mb-2">OxeFit UAE</h1>
                        <p className="text-slate-400 text-sm mb-10 tracking-widest uppercase">Operations Platform v2.0</p>
                        
                        <button onClick={login} className="w-full py-4 bg-sky-500 hover:bg-sky-400 text-white rounded-xl font-bold transition-all shadow-lg shadow-sky-500/20 flex items-center justify-center gap-3">
                            <svg className="w-5 h-5" viewBox="0 0 23 23"><path fill="#f3f3f3" d="M0 0h11v11H0z"/><path fill="#f3f3f3" d="M12 0h11v11H12z"/><path fill="#f3f3f3" d="M0 12h11v11H0z"/><path fill="#f3f3f3" d="M12 12h11v11H12z"/></svg>
                            Sign in with Azure AD
                        </button>
                        
                        <div className="mt-10 pt-10 border-t border-slate-800 text-[10px] text-slate-500 leading-relaxed">
                            Secured by Microsoft Identity · Restricted to core-velocity.com<br/>
                            Client ID: cd1b7f5f-5ff9-4066-ab4f-06f270a94fcb
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex min-h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#060e22] border-r border-[#1a3360] flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-[#1a3360]">
                            <div className="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white font-black text-sm italic">OX</div>
                            <div>
                                <div className="serif text-sm leading-none mb-1">OxeFit UAE</div>
                                <div className="text-[9px] text-slate-500 uppercase tracking-tighter">Ops Center v2.0</div>
                            </div>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
                                { id: 'delivery', label: 'Deliveries', icon: 'delivery' },
                                { id: 'spares', label: 'Spare Parts', icon: 'spare' },
                                { id: 'shipping', label: 'Shipping Logs', icon: 'shipping' },
                                { id: 'tickets', label: 'Support Tickets', icon: 'ticket' },
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveModule(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeModule === item.id ? 'bg-sky-500/10 text-sky-400' : 'text-slate-400 hover:bg-slate-800/50'}`}>
                                    <Icon name={item.icon} size={18} color={activeModule === item.id ? "#0ea5e9" : "#475569"} />
                                    <span className="text-sm font-semibold">{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-[#1a3360]">
                            <div className="flex items-center gap-3 px-2 py-3">
                                <div className="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-[10px] font-bold text-white uppercase tracking-tighter shadow-lg shadow-indigo-500/20">
                                    {account.name.split(' ').map(n => n[0]).join('')}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-xs font-bold truncate">{account.name}</div>
                                    <div className="text-[10px] text-sky-400 uppercase font-black">{role}</div>
                                </div>
                                <button onClick={logout} className="text-slate-500 hover:text-rose-400 transition-colors">
                                    <Icon name="logout" size={16} />
                                </button>
                            </div>
                            
                            <div className="mt-2 px-2 py-2 rounded-lg bg-[#0d1c3d] flex items-center justify-between">
                                <span className="text-[9px] text-slate-500 uppercase font-bold">OneDrive Sync</span>
                                {syncStatus === 'syncing' ? (
                                    <div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                                ) : (
                                    <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0">
                        {/* Header */}
                        <header className="h-16 border-b border-[#1a3360] bg-[#08112b] px-8 flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-4">
                                <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest">{activeModule}</h2>
                                <span className="text-[#1a3360]">/</span>
                                <span className="text-xs text-slate-500 uppercase font-bold italic">{new Date().toLocaleDateString('en-AE', { weekday: 'long', day: 'numeric', month: 'short' })}</span>
                            </div>
                            
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/5 border border-emerald-500/10">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                                    <span className="text-[10px] text-emerald-500 font-black uppercase">Live Platform</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8">
                            {activeModule === 'dashboard' && <DashboardModule data={data} />}
                            {activeModule === 'delivery' && <DeliveryModule data={data} updateData={updateData} role={role} />}
                            {activeModule === 'spares' && <SpareModule data={data} updateData={updateData} role={role} />}
                            {activeModule === 'shipping' && <ShippingModule data={data} updateData={updateData} role={role} />}
                            {activeModule === 'tickets' && <TicketModule data={data} updateData={updateData} role={role} />}
                        </div>
                    </main>
                </div>
            );
        }

        /* ─── Dashboard Component ─── */
        function DashboardModule({ data }) {
            const stats = [
                { label: 'Delivery Notes', val: data.deliveries.length, icon: 'delivery', color: 'text-sky-400' },
                { label: 'Units Deployed', val: data.deliveries.reduce((a,b) => a+b.units,0), icon: 'delivery', color: 'text-emerald-400' },
                { label: 'Parts in Stock', val: data.spares.reduce((a,b) => a+b.stock,0), icon: 'spare', color: 'text-amber-400' },
                { label: 'Active Tickets', val: data.tickets.filter(t => t.status !== 'Resolved').length, icon: 'ticket', color: 'text-rose-400' }
            ];

            return (
                <div className="space-y-10">
                    <div className="grid grid-cols-4 gap-6">
                        {stats.map((s, i) => (
                            <div key={i} className="glass p-6 rounded-3xl border-slate-800/50">
                                <div className="flex items-center justify-between mb-4">
                                    <div className={`p-3 rounded-2xl bg-slate-900/50 ${s.color}`}>
                                        <Icon name={s.icon} size={20} />
                                    </div>
                                    <span className="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">Live Realtime</span>
                                </div>
                                <div className="text-4xl serif font-black mb-1">{s.val}</div>
                                <div className="text-[10px] text-slate-500 font-black uppercase tracking-widest">{s.label}</div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-2 gap-8">
                        <div className="glass p-8 rounded-3xl border-slate-800/50">
                            <h3 className="serif text-xl mb-6">Recent Activity</h3>
                            <div className="space-y-4">
                                {data.deliveries.slice(0, 5).map(d => (
                                    <div key={d.id} className="flex items-center justify-between py-3 border-b border-slate-800/50 last:border-0">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-[10px] font-black text-sky-400">DN</div>
                                            <div>
                                                <div className="text-sm font-bold">{d.customer}</div>
                                                <div className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">{d.id} · {d.orderDate}</div>
                                            </div>
                                        </div>
                                        <Badge status={d.status} />
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass p-8 rounded-3xl border-slate-800/50">
                            <h3 className="serif text-xl mb-6">Logistics Spend</h3>
                            <div className="flex flex-col h-full justify-between pb-8">
                                <div>
                                    <div className="text-6xl serif font-black text-amber-500 mb-2">
                                        <span className="text-2xl mr-2">AED</span>
                                        {data.shipping.reduce((a,b) => a+b.cost, 0).toLocaleString()}
                                    </div>
                                    <div className="text-xs text-slate-500 uppercase tracking-[0.2em] font-black">Total Verified Cost</div>
                                </div>
                                <div className="mt-10 p-6 rounded-2xl bg-slate-900/50 border border-slate-800/50">
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-[10px] text-slate-500 font-black uppercase">Carrier Efficiency</span>
                                        <span className="text-[10px] text-emerald-400 font-black">Optimal</span>
                                    </div>
                                    <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-emerald-500 w-[84%]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ─── Module Template (Delivery) ─── */
        function DeliveryModule({ data, updateData, role }) {
            const [search, setSearch] = useState("");
            const [showModal, setShowModal] = useState(false);
            const [editItem, setEditItem] = useState(null);
            
            const [form, setForm] = useState({ id: '', orderDate: '', customer: '', status: 'Pending', units: 1, special: '', estDelivery: '', actDelivery: '' });

            const handleSave = () => {
                const updated = editItem 
                    ? data.deliveries.map(d => d.id === editItem.id ? form : d)
                    : [...data.deliveries, form];
                updateData({ ...data, deliveries: updated });
                setShowModal(false);
                setEditItem(null);
            };

            const filtered = data.deliveries.filter(d => 
                d.customer.toLowerCase().includes(search.toLowerCase()) || 
                d.id.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <div className="relative w-96">
                            <input 
                                value={search} 
                                onChange={e => setSearch(e.target.value)}
                                className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl py-3 pl-12 pr-4 text-sm focus:border-sky-500 outline-none transition-all"
                                placeholder="Search by DN ID or Customer..."
                            />
                            <Icon name="delivery" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" size={18} />
                        </div>
                        <button onClick={() => { setEditItem(null); setForm({ id: `DN-24${String(data.deliveries.length+1).padStart(2, '0')}`, orderDate: new Date().toISOString().split('T')[0], customer: '', status: 'Pending', units: 1, special: '', estDelivery: '', actDelivery: '' }); setShowModal(true); }} className="px-6 py-3 bg-sky-500 hover:bg-sky-400 text-white rounded-xl font-bold flex items-center gap-2 transition-all">
                            <Icon name="plus" size={16} /> New Delivery Note
                        </button>
                    </div>

                    <div className="glass rounded-3xl overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-slate-900/50">
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">ID</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Customer</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Units</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Status</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Order Date</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Est. Delivery</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/50">
                                {filtered.map(d => (
                                    <tr key={d.id} className="hover:bg-slate-800/30 transition-colors">
                                        <td className="px-6 py-4 text-xs font-black text-sky-400 font-mono">{d.id}</td>
                                        <td className="px-6 py-4 text-sm font-bold">{d.customer}</td>
                                        <td className="px-6 py-4 text-sm font-black text-emerald-400">{d.units}</td>
                                        <td className="px-6 py-4"><Badge status={d.status} /></td>
                                        <td className="px-6 py-4 text-xs text-slate-500 font-bold">{d.orderDate}</td>
                                        <td className="px-6 py-4 text-xs text-slate-500 font-bold italic">{d.estDelivery}</td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => { setEditItem(d); setForm({...d}); setShowModal(true); }} className="p-2 hover:bg-sky-500/10 rounded-lg text-sky-500 transition-colors"><Icon name="edit" size={14} /></button>
                                                <button onClick={() => updateData({...data, deliveries: data.deliveries.filter(x => x.id !== d.id)})} className="p-2 hover:bg-rose-500/10 rounded-lg text-rose-500 transition-colors"><Icon name="trash" size={14} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md">
                            <div className="max-w-xl w-full glass rounded-3xl p-8 border-sky-500/20 shadow-2xl">
                                <h2 className="serif text-2xl mb-6">Delivery Details</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">DN ID</label>
                                        <input value={form.id} onChange={e => setForm({...form, id: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Order Date</label>
                                        <input type="date" value={form.orderDate} onChange={e => setForm({...form, orderDate: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="col-span-2 space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Customer</label>
                                        <input value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Units</label>
                                        <input type="number" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Status</label>
                                        <select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm">
                                            {['Pending', 'In Transit', 'Delivered', 'Cancelled'].map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Est. Delivery</label>
                                        <input type="date" value={form.estDelivery} onChange={e => setForm({...form, estDelivery: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Act. Delivery</label>
                                        <input type="date" value={form.actDelivery} onChange={e => setForm({...form, actDelivery: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="col-span-2 space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Special Deliverables</label>
                                        <textarea value={form.special} onChange={e => setForm({...form, special: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm h-24" />
                                    </div>
                                </div>
                                <div className="mt-8 flex gap-3">
                                    <button onClick={() => setShowModal(false)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-all">Cancel</button>
                                    <button onClick={handleSave} className="flex-1 py-3 bg-sky-500 hover:bg-sky-400 text-white rounded-xl font-bold transition-all">Save Record</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ─── Spare Parts Module ─── */
        function SpareModule({ data, updateData, role }) {
            const [search, setSearch] = useState("");
            const [showModal, setShowModal] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [form, setForm] = useState({ id: '', partName: '', partNo: '', category: 'Electronics', stock: 0, minStock: 5, location: 'Dubai WH', updated: '' });

            const handleSave = () => {
                const updated = editItem 
                    ? data.spares.map(s => s.id === editItem.id ? form : s)
                    : [...data.spares, form];
                updateData({ ...data, spares: updated });
                setShowModal(false);
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <input value={search} onChange={e => setSearch(e.target.value)} className="w-96 bg-[#0d1c3d] border border-[#1a3360] rounded-xl py-3 px-4 text-sm" placeholder="Search Spares..." />
                        <button onClick={() => { setEditItem(null); setForm({ id: `SP-${String(data.spares.length+1).padStart(3, '0')}`, partName: '', partNo: '', category: 'Electronics', stock: 0, minStock: 5, location: 'Dubai WH', updated: new Date().toISOString().split('T')[0] }); setShowModal(true); }} className="px-6 py-3 bg-amber-500 hover:bg-amber-400 text-black rounded-xl font-bold flex items-center gap-2 transition-all">
                            <Icon name="plus" size={16} /> Add Part
                        </button>
                    </div>
                    <div className="glass rounded-3xl overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-900/50">
                                <tr>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Part ID</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Name</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Category</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Stock</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Location</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/50">
                                {data.spares.map(s => (
                                    <tr key={s.id}>
                                        <td className="px-6 py-4 font-mono text-amber-500 text-xs">{s.id}</td>
                                        <td className="px-6 py-4 font-bold">{s.partName}</td>
                                        <td className="px-6 py-4 text-xs font-bold uppercase text-slate-500">{s.category}</td>
                                        <td className={`px-6 py-4 font-black ${s.stock < s.minStock ? 'text-rose-500' : 'text-emerald-500'}`}>{s.stock}</td>
                                        <td className="px-6 py-4 text-xs font-bold uppercase text-slate-500">{s.location}</td>
                                        <td className="px-6 py-4">
                                            <button onClick={() => { setEditItem(s); setForm({...s}); setShowModal(true); }} className="text-sky-500"><Icon name="edit" size={14} /></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md">
                            <div className="max-w-xl w-full glass rounded-3xl p-8 border-sky-500/20 shadow-2xl">
                                <h2 className="serif text-2xl mb-6">Part Details</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2 space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Part Name</label>
                                        <input value={form.partName} onChange={e => setForm({...form, partName: e.target.value})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Stock</label>
                                        <input type="number" value={form.stock} onChange={e => setForm({...form, stock: parseInt(e.target.value)})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Min Stock</label>
                                        <input type="number" value={form.minStock} onChange={e => setForm({...form, minStock: parseInt(e.target.value)})} className="w-full bg-[#0d1c3d] border border-[#1a3360] rounded-xl px-4 py-3 text-sm" />
                                    </div>
                                </div>
                                <div className="mt-8 flex gap-3">
                                    <button onClick={() => setShowModal(false)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-all">Cancel</button>
                                    <button onClick={handleSave} className="flex-1 py-3 bg-amber-500 hover:bg-amber-400 text-black rounded-xl font-bold transition-all">Save Part</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ─── Shipping Logs Module ─── */
        function ShippingModule({ data, updateData, role }) {
            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h3 className="serif text-xl">Logistics Expense Tracker</h3>
                        <button className="px-6 py-3 bg-indigo-500 hover:bg-indigo-400 text-white rounded-xl font-bold transition-all flex items-center gap-2">
                             <Icon name="plus" size={16} /> New Log
                        </button>
                    </div>
                    <div className="glass rounded-3xl overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-900/50">
                                <tr>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Log ID</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Carrier</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Route</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Cost (AED)</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.shipping.map(s => (
                                    <tr key={s.id} className="border-b border-slate-800/50">
                                        <td className="px-6 py-4 font-mono text-indigo-400 text-xs">{s.id}</td>
                                        <td className="px-6 py-4 font-bold">{s.carrier}</td>
                                        <td className="px-6 py-4 text-xs font-bold text-slate-500">{s.origin} → {s.dest}</td>
                                        <td className="px-6 py-4 font-black text-amber-500">AED {s.cost.toLocaleString()}</td>
                                        <td className="px-6 py-4"><Badge status={s.status} /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        /* ─── Ticket Module ─── */
        function TicketModule({ data, updateData, role }) {
            return (
                <div className="space-y-6">
                    <div className="glass p-6 rounded-3xl border-sky-500/20 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl bg-sky-500/10 flex items-center justify-center text-sky-500">
                                <Icon name="sync" size={24} className="animate-pulse-soft" />
                            </div>
                            <div>
                                <h4 className="font-bold text-sky-400">Outlook Integration Active</h4>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Polling Mail.Read & Tasks.ReadWrite every 5 mins</p>
                            </div>
                        </div>
                        <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all">Manual Refresh</button>
                    </div>

                    <div className="glass rounded-3xl overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-900/50">
                                <tr>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Ticket</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Priority</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Source</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Assignee</th>
                                    <th className="px-6 py-4 text-[10px] font-black text-slate-500 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.tickets.map(t => (
                                    <tr key={t.id} className="border-b border-slate-800/50">
                                        <td className="px-6 py-4">
                                            <div className="text-sm font-bold truncate max-w-[200px]">{t.subject}</div>
                                            <div className="text-[10px] text-slate-500 font-mono">{t.id}</div>
                                        </td>
                                        <td className="px-6 py-4"><Badge status={t.priority} /></td>
                                        <td className="px-6 py-4 text-[10px] font-black text-indigo-400 uppercase tracking-widest">{t.source}</td>
                                        <td className="px-6 py-4 text-xs font-bold text-slate-500">{t.assignee}</td>
                                        <td className="px-6 py-4"><Badge status={t.status} /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
